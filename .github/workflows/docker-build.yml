name: docker-build

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { tag: cn, features: "" }
          - { tag: oth, features: "oth" }
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.target.tag }}
        run: |
          docker build \
            --build-arg FEATURES="${{ matrix.target.features }}" \
            -t ghcr.io/${{ github.repository }}:${{ matrix.target.tag }} .
          docker push ghcr.io/${{ github.repository }}:${{ matrix.target.tag }}
